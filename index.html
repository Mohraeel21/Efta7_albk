<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>افتح قلبك ♥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #3d2418;       /* بني شوكولاتة دافئ */
    --bg-deep: #2a1811;
    --card: #f8ede1;     /* كريمي دافئ */
    --ink: #2e1c14;
    --ink-soft: #7a5c48;
    --rose: #a83e46;     /* روز/توتي غامق */
    --blush: #e7b7ae;    /* وردي فاتح */
    --leaf: #52683f;     /* أخضر ورق */
    --line: #cbb49c;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
    background:
      radial-gradient(circle at 15% 15%, rgba(168,62,70,.18), transparent 42%),
      radial-gradient(circle at 90% 85%, rgba(82,104,63,.15), transparent 45%),
      var(--bg);
    font-family:'Tajawal', sans-serif;
    color: var(--ink);
    overflow-x:hidden;
  }

  .ticket{
    position:relative;
    width:100%;
    max-width: 440px;
    background: var(--card);
    border-radius: 22px;
    box-shadow: 0 30px 60px rgba(0,0,0,.5), 0 4px 14px rgba(0,0,0,.35);
    opacity:0;
    transform: translateY(18px);
    animation: rise .8s cubic-bezier(.2,.8,.2,1) forwards .15s;
    overflow:hidden;
  }
  @keyframes rise{ to{ opacity:1; transform: translateY(0); } }

  .hero{
    position:relative;
    padding: 30px 24px 8px;
    text-align:center;
    background: linear-gradient(180deg, rgba(231,183,174,.25), transparent 70%);
  }

  .mugs{ width:190px; height:auto; margin:0 auto 6px; display:block; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--rose);
    font-weight: 700;
  }

  .title{
    font-family:'Lalezar', sans-serif;
    font-size: 52px;
    line-height: 1;
    margin: 8px 0 6px;
    color: var(--ink);
  }
  .title .heart{ color: var(--rose); }

  .subtitle{
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0 0 18px;
    font-weight: 500;
  }

  .match-banner{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin: 4px 8px 20px;
    padding: 14px 10px;
    background: linear-gradient(135deg, rgba(82,104,63,.14), rgba(168,62,70,.10));
    border: 1px dashed rgba(82,104,63,.4);
    border-radius: 16px;
  }
  .team{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:2px;
  }
  .flag{
    font-size: 30px;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,.15));
  }
  .team-name{
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
  }
  .vs{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 2px;
  }
  .vs-text{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight:700;
    color: var(--rose);
    letter-spacing:1px;
  }
  .ball{
    font-size: 22px;
    display:inline-block;
    animation: bounce 1.4s ease-in-out infinite;
  }
  @keyframes bounce{
    0%, 100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-6px) rotate(25deg); }
  }

  .perforation{
    position:relative;
    height:0;
    border-top: 2px dashed var(--line);
  }
  .perforation::before, .perforation::after{
    content:'';
    position:absolute; top:-11px;
    width:22px; height:22px;
    border-radius:50%;
    background: var(--bg-deep);
  }
  .perforation::before{ left:-11px; }
  .perforation::after{ right:-11px; }

  .stub{
    padding: 24px 28px 26px;
    display:flex;
    gap: 14px;
  }
  .stub-block{ flex:1; text-align:center; }
  .stub-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .stub-value{
    font-family:'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
  }
  .divider-v{ width:1px; background: var(--line); opacity:.7; }

  .place{
    margin: 2px 28px 0;
    padding: 16px;
    background: rgba(168,62,70,.08);
    border: 1px solid rgba(168,62,70,.22);
    border-radius: 14px;
    text-align:center;
  }
  .place-name{ font-weight:900; font-size:17px; color:var(--ink); margin-bottom:2px; }
  .place-sub{ font-size:12.5px; color:var(--ink-soft); }

  .cta-zone{ padding: 20px 28px 30px; }
  .cta{
    display:block;
    text-align:center;
    text-decoration:none;
    background: var(--rose);
    color: var(--card);
    padding: 15px 20px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing:.3px;
    transition: transform .15s ease, background .2s ease;
  }
  .cta:hover{ background:#8f333a; transform: translateY(-2px); }
  .cta .arrow{ display:inline-block; margin-inline-start:6px; transition: transform .15s ease; }
  .cta:hover .arrow{ transform: translateX(-4px); }

  .foot-note{
    text-align:center;
    font-size: 12px;
    color: rgba(248,237,225,.6);
    margin-top: 22px;
  }

  @media (max-width:380px){
    .title{ font-size: 42px; }
    .stub-value{ font-size: 21px; }
    .mugs{ width:160px; }
  }
</style>
</head>
<body>

<div class="ticket">

  <div class="hero">
    <!-- رسمة أصلية بروح دافئة: فنجانين قلب لاتيه ممسوكين بإيدين، وورقة نبات بسيطة -->
    <svg class="mugs" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <!-- ورقتين ديكور -->
      <path d="M188 6 C 200 4, 210 12, 208 22 C 198 20, 188 16, 188 6 Z" fill="#52683f" opacity="0.85"/>
      <path d="M200 18 C 212 18, 220 26, 216 36 C 206 32, 198 28, 200 18 Z" fill="#6d8a54" opacity="0.85"/>

      <!-- فنجان شمال: كوب عالي على صحن + إيدة -->
      <g>
        <ellipse cx="52" cy="100" rx="38" ry="7" fill="#d9bfa2"/>
        <path d="M22 72 C22 68, 26 66, 30 66 L74 66 C78 66, 82 68, 82 72 L78 92 C77 100, 68 106, 52 106 C36 106, 27 100, 26 92 Z" fill="#f3e2d1"/>
        <ellipse cx="52" cy="72" rx="30" ry="9" fill="#8a5636"/>
        <path d="M80 74 c10 -3 18 3 18 12 c0 9 -8 14 -18 12" fill="none" stroke="#f3e2d1" stroke-width="4.5" stroke-linecap="round"/>
        <path d="M52 72 c-3 -4 -8 -4 -8 0 c0 4 5 7 8 4 c3 -3 3 -8 0 -4 Z" fill="#f3e2d1"/>
      </g>
      <!-- إيد شمال -->
      <path d="M18 96 C15 110, 24 122, 40 123 C54 124, 66 116, 66 102 L66 98 C55 102, 40 102, 27 98 C22 97, 19 97, 18 96 Z" fill="#e8b98f"/>

      <!-- فنجان يمين: كوب مخروطي على صحن -->
      <g>
        <ellipse cx="152" cy="104" rx="34" ry="6.5" fill="#c9ad8f"/>
        <path d="M128 76 L176 76 L169 98 C167 105, 160 110, 152 110 C144 110, 137 105, 135 98 Z" fill="#e6cfb8"/>
        <ellipse cx="152" cy="76" rx="24" ry="7.5" fill="#8a5636"/>
        <path d="M144 76 c-2.5 -3.5 -6.5 -3.5 -6.5 0 c0 3.5 4 6 6.5 3 c2.5 -3 2.5 -6.5 0 -3 Z" fill="#e6cfb8"/>
      </g>
      <!-- إيد يمين -->
      <path d="M178 98 C182 110, 175 120, 163 122 C152 124, 141 117, 141 105 L141 101 C150 105, 163 105, 174 101 C176 100, 177 99, 178 98 Z" fill="#e8b98f"/>
    </svg>

    <div class="eyebrow">دعوة خاصة</div>
    <h1 class="title">افتح قلبك <span class="heart">♥</span></h1>
    <p class="subtitle">يلا بينا نقعد نرغي ونشرب حاجة سخنة، وبعدها نتفرج على الماتش سوا ⚽</p>
    <div class="match-banner">
      <div class="team">
        <span class="flag">🇪🇬</span>
        <span class="team-name">مصر</span>
      </div>
      <div class="vs">
        <span class="ball">⚽</span>
        <span class="vs-text">VS</span>
      </div>
      <div class="team">
        <span class="flag">🇦🇷</span>
        <span class="team-name">الأرجنتين</span>
      </div>
    </div>
  </div>

  <div class="perforation"></div>

  <div class="stub">
    <div class="stub-block">
      <div class="stub-label">التاريخ</div>
      <div class="stub-value">7 / 7</div>
    </div>
    <div class="divider-v"></div>
    <div class="stub-block">
      <div class="stub-label">الميعاد</div>
      <div class="stub-value">5:00 م</div>
    </div>
  </div>

  <div class="place">
    <div class="place-name">محمصة رياحين</div>
    <div class="place-sub">قريب من محطة الرمل، الإسكندرية</div>
  </div>

  <div class="cta-zone">
    <a class="cta" href="https://maps.app.goo.gl/8WQ8wFvMEx2eSRaFA?g_st=ac" target="_blank" rel="noopener">
      افتح الموقع على الخريطة <span class="arrow">←</span>
    </a>
  </div>

</div>

<p class="foot-note">مستنياك متتأخرش 🙂</p>

</body>
</html>
